<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Grind House 🔥</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root {
  --bg: #0a0a0f;
  --bg2: #111118;
  --bg3: #1a1a24;
  --border: #ffffff0f;
  --border2: #ffffff18;
  --text: #f0f0f5;
  --text2: #9090a8;
  --text3: #5a5a72;
  --accent: #6c63ff;
  --accent2: #ff6b6b;
  --accent3: #ffd166;
  --accent4: #06d6a0;
  --fire: #ff6b35;
  --card-shadow: 0 4px 24px #0000004d;
  --radius: 16px;
  --radius-sm: 10px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;display:flex;justify-content:center;overscroll-behavior-y:none;touch-action:manipulation;-webkit-text-size-adjust:100%}
#app{width:100%;max-width:480px;min-height:100vh;position:relative;min-width:0}
h1,h2,h3,h4{font-family:'Syne',sans-serif}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

/* UTILS */
.hide{display:none!important}
.flex{display:flex}
.col{flex-direction:column}
.gap4{gap:4px}.gap8{gap:8px}.gap12{gap:12px}.gap16{gap:16px}.gap24{gap:24px}
.center{align-items:center;justify-content:center}
.between{justify-content:space-between}
.wrap{flex-wrap:wrap}
.w100{width:100%}
.relative{position:relative}
.pointer{cursor:pointer}
.bold{font-weight:600}

/* LAYOUT */
#app{min-height:100vh}
.page{display:none;min-height:100vh;padding-bottom:80px;overflow-x:hidden}
.page.active{display:block}
.container{max-width:480px;margin:0 auto;padding:0 16px}

/* NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);z-index:100;padding:8px 0 max(8px,env(safe-area-inset-bottom))}
.nav-items{display:flex;justify-content:space-around;max-width:480px;margin:0 auto}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 4px;cursor:pointer;transition:all .2s;border-radius:10px;color:var(--text3);font-size:11px;font-family:'DM Sans',sans-serif}
.nav-item.active{color:var(--accent)}
.nav-item svg{width:22px;height:22px;transition:all .2s}
.nav-item.active svg{filter:drop-shadow(0 0 6px var(--accent))}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;transition:all .2s}
.card-sm{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px}

/* BADGE */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;font-family:'Syne',sans-serif}
.badge-accent{background:#6c63ff22;color:var(--accent);border:1px solid #6c63ff33}
.badge-fire{background:#ff6b3522;color:var(--fire);border:1px solid #ff6b3533}
.badge-green{background:#06d6a022;color:var(--accent4);border:1px solid #06d6a033}
.badge-yellow{background:#ffd16622;color:var(--accent3);border:1px solid #ffd16633}
.badge-red{background:#ff6b6b22;color:var(--accent2);border:1px solid #ff6b6b33}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 20px;border-radius:var(--radius-sm);font-size:14px;font-weight:600;font-family:'Syne',sans-serif;cursor:pointer;transition:all .2s;border:none;outline:none}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:active{transform:scale(.97);background:#5a52e0}
.btn-ghost{background:var(--bg3);color:var(--text);border:1px solid var(--border2)}
.btn-ghost:active{transform:scale(.97)}
.btn-danger{background:#ff6b6b22;color:var(--accent2);border:1px solid #ff6b6b33}
.btn-full{width:100%}
.btn-sm{padding:8px 14px;font-size:12px}

/* INPUTS */
.input-group{display:flex;flex-direction:column;gap:6px}
.input-label{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;font-family:'Syne',sans-serif}
.input{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:12px 14px;color:var(--text);font-size:16px;font-family:'DM Sans',sans-serif;outline:none;transition:all .2s;width:100%;-webkit-appearance:none;appearance:none}
.input:focus{border-color:var(--accent);box-shadow:0 0 0 3px #6c63ff18}
.input::placeholder{color:var(--text3)}
.input-row{display:flex;gap:8px;align-items:center}
.input-small{padding:8px 10px;font-size:14px;text-align:center;width:70px}

/* ========== LOGIN PAGE ========== */
#loginPage{display:flex;flex-direction:column;min-height:100vh;padding:0}
.login-hero{padding:60px 24px 32px;text-align:center}
.login-logo{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;letter-spacing:-.02em;margin-bottom:8px}
.login-sub{color:var(--text2);font-size:15px}
.login-form{padding:0 24px;display:flex;flex-direction:column;gap:16px}
.login-toggle{display:flex;background:var(--bg3);border-radius:var(--radius-sm);padding:3px;margin-bottom:4px}
.toggle-btn{flex:1;padding:8px;border-radius:8px;font-size:13px;font-weight:600;font-family:'Syne',sans-serif;cursor:pointer;border:none;background:transparent;color:var(--text2);transition:all .2s}
.toggle-btn.active{background:var(--accent);color:#fff}
.login-error{color:var(--accent2);font-size:13px;text-align:center;min-height:18px}
.stream-selector{display:flex;gap:8px}
.stream-btn{flex:1;padding:10px 8px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;font-family:'Syne',sans-serif;cursor:pointer;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);transition:all .2s}
.stream-btn.active{border-color:var(--accent);background:#6c63ff18;color:var(--accent)}
.max-users-notice{text-align:center;padding:16px;color:var(--text2);font-size:13px;background:var(--bg3);border-radius:var(--radius-sm);border:1px solid var(--border)}

/* ========== ONBOARDING ========== */
#onboardingPage{padding:0;display:flex;flex-direction:column;min-height:100vh}
.onboard-step{display:none;flex:1;flex-direction:column;padding:40px 24px;min-height:100vh}
.onboard-step.active{display:flex}
.onboard-icon{font-size:56px;margin-bottom:24px}
.onboard-title{font-size:26px;font-weight:800;margin-bottom:10px;line-height:1.2}
.onboard-desc{color:var(--text2);font-size:15px;line-height:1.6;margin-bottom:32px}
.onboard-progress{display:flex;gap:6px;margin-bottom:32px}
.onboard-dot{width:6px;height:6px;border-radius:3px;background:var(--border2);transition:all .3s}
.onboard-dot.active{width:20px;background:var(--accent)}

/* ========== HOME PAGE ========== */
.page-header{padding:20px 16px 12px;display:flex;align-items:center;justify-content:space-between}
.page-title{font-size:22px;font-weight:800;letter-spacing:-.02em}
.page-subtitle{font-size:13px;color:var(--text2);margin-top:2px}

/* Today card */
.today-card{margin:0 16px 16px;background:linear-gradient(135deg,#6c63ff18,#6c63ff08);border:1px solid #6c63ff28;border-radius:var(--radius);padding:18px}
.today-date{font-size:12px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.today-status{font-size:20px;font-weight:800;font-family:'Syne',sans-serif;margin-bottom:12px}
.today-members{display:flex;flex-wrap:wrap;gap:8px}
.member-tick{display:flex;align-items:center;gap:5px;font-size:12px;padding:4px 10px;border-radius:20px;font-weight:500}
.member-tick.done{background:#06d6a018;color:var(--accent4);border:1px solid #06d6a028}
.member-tick.pending{background:#ffffff08;color:var(--text3);border:1px solid var(--border)}
.member-tick.partial{background:#ffd16618;color:var(--accent3);border:1px solid #ffd16628}

/* Pinned message */
.pinned-msg{margin:0 16px 16px;background:#ffd16610;border:1px solid #ffd16628;border-radius:var(--radius-sm);padding:12px 14px;display:flex;align-items:flex-start;gap:10px}
.pinned-icon{font-size:16px;flex-shrink:0;margin-top:1px}
.pinned-text{font-size:13px;color:var(--text);line-height:1.5;flex:1}

/* Countdowns */
.section-label{padding:0 16px;margin-bottom:10px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);font-family:'Syne',sans-serif}
.countdowns-row{padding:0 16px;display:flex;gap:10px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.countdowns-row::-webkit-scrollbar{display:none}
.countdown-chip{flex-shrink:0;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;min-width:120px;text-align:center}
.countdown-days{font-size:28px;font-weight:800;font-family:'Syne',sans-serif;line-height:1;color:var(--accent3)}
.countdown-name{font-size:11px;color:var(--text2);margin-top:4px;font-weight:500}
.countdown-sub{font-size:10px;color:var(--text3);margin-top:2px}

/* Feed */
.feed-list{padding:0 16px;display:flex;flex-direction:column;gap:10px}
.feed-item{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px}
.feed-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
.feed-name{font-size:13px;font-weight:700;font-family:'Syne',sans-serif}
.feed-time{font-size:11px;color:var(--text3);flex-shrink:0}
.feed-msg{font-size:13px;color:var(--text2);line-height:1.5;margin-bottom:8px}
.feed-note{font-size:12px;color:var(--text3);font-style:italic;margin-bottom:8px}
.feed-reactions{display:flex;gap:6px}
.reaction-btn{background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:3px 8px;font-size:13px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:3px}
.reaction-btn span{font-size:11px;color:var(--text2)}
.reaction-btn.active{border-color:var(--accent);background:#6c63ff18}
.reaction-btn:active{transform:scale(.93)}

/* ========== LEADERBOARD ========== */
.leaderboard-list{padding:0 16px;display:flex;flex-direction:column;gap:10px}
.lb-item{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.lb-item:active{transform:scale(.98)}
.lb-item.top1{border-color:#ffd16640;background:linear-gradient(135deg,#ffd16608,var(--bg2))}
.lb-item.top2{border-color:#9090a830}
.lb-item.top3{border-color:#cd7f3230}
.lb-rank{font-size:18px;font-weight:800;font-family:'Syne',sans-serif;width:28px;flex-shrink:0;color:var(--text3)}
.lb-rank.r1{color:var(--accent3)}
.lb-rank.r2{color:#c0c0c0}
.lb-rank.r3{color:#cd7f32}
.lb-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;font-family:'Syne',sans-serif;flex-shrink:0}
.lb-info{flex:1;min-width:0}
.lb-name{font-size:15px;font-weight:700;font-family:'Syne',sans-serif;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lb-meta{font-size:12px;color:var(--text2);margin-top:2px}
.lb-right{text-align:right;flex-shrink:0}
.lb-hours{font-size:18px;font-weight:800;font-family:'Syne',sans-serif;color:var(--text);line-height:1}
.lb-hrs-label{font-size:10px;color:var(--text3)}
.lb-below4{position:absolute;right:12px;top:4px;font-size:9px;color:var(--accent2);font-weight:700;text-transform:uppercase}
.lb-stats-row{padding:0 16px;display:flex;gap:10px;margin-bottom:16px}
.lb-stat-chip{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;text-align:center}
.lb-stat-val{font-size:16px;font-weight:800;font-family:'Syne',sans-serif;color:var(--accent)}
.lb-stat-label{font-size:10px;color:var(--text3);margin-top:2px;font-weight:500}

/* ========== PROFILE PAGE ========== */
.profile-header{padding:20px 16px;display:flex;align-items:center;gap:14px}
.profile-avatar{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;font-family:'Syne',sans-serif;flex-shrink:0}
.profile-name{font-size:22px;font-weight:800;font-family:'Syne',sans-serif}
.profile-level{font-size:13px;color:var(--text2);margin-top:2px}
.profile-xp-bar{height:4px;background:var(--bg3);border-radius:4px;margin-top:8px;overflow:hidden}
.profile-xp-fill{height:100%;border-radius:4px;background:var(--accent);transition:width .6s}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px;margin-bottom:16px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px}
.stat-val{font-size:22px;font-weight:800;font-family:'Syne',sans-serif;color:var(--text);line-height:1}
.stat-label{font-size:11px;color:var(--text3);margin-top:4px;font-weight:500}
.stat-sub{font-size:10px;color:var(--text3);margin-top:2px}

/* Heatmap */
.heatmap-grid{display:grid;grid-template-columns:repeat(10,1fr);gap:4px;padding:0 16px;margin-bottom:16px}
.heatmap-cell{aspect-ratio:1;border-radius:4px;cursor:pointer;transition:all .2s;position:relative}
.heatmap-cell:active{transform:scale(.9)}
.heat0{background:var(--bg3)}
.heat1{background:#6c63ff30}
.heat2{background:#6c63ff60}
.heat3{background:#6c63ff90}
.heat4{background:var(--accent)}
.heat5{background:#8a83ff}

/* Category bar */
.cat-bars{display:flex;flex-direction:column;gap:8px;padding:0 16px}
.cat-bar-row{display:flex;align-items:center;gap:10px}
.cat-bar-label{font-size:12px;color:var(--text2);width:130px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cat-bar-track{flex:1;height:6px;background:var(--bg3);border-radius:6px;overflow:hidden}
.cat-bar-fill{height:100%;border-radius:6px;transition:width .6s}
.cat-bar-val{font-size:11px;color:var(--text3);width:32px;text-align:right;flex-shrink:0}

/* Badges section */
.badges-row{padding:0 16px;display:flex;flex-wrap:wrap;gap:8px}

/* Slump detector */
.slump-card{margin:0 16px 16px;background:#ff6b6b10;border:1px solid #ff6b6b28;border-radius:var(--radius-sm);padding:12px 14px}

/* Vs yesterday */
.vs-yesterday{margin:0 16px 16px;display:flex;gap:10px}
.vs-card{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;text-align:center}
.vs-val{font-size:18px;font-weight:800;font-family:'Syne',sans-serif}
.vs-label{font-size:10px;color:var(--text3);margin-top:3px}

/* Week/30 toggle */
.view-toggle{display:flex;background:var(--bg3);border-radius:var(--radius-sm);padding:3px;margin:0 16px 16px}
.view-btn{flex:1;padding:7px;border-radius:7px;font-size:12px;font-weight:600;font-family:'Syne',sans-serif;cursor:pointer;border:none;background:transparent;color:var(--text2);transition:all .2s}
.view-btn.active{background:var(--bg2);color:var(--text);box-shadow:0 1px 4px #00000040}

/* ========== LOG PAGE ========== */
.log-header{padding:20px 16px 16px;display:flex;align-items:center;gap:12px}
.back-btn{width:36px;height:36px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.cat-log-rows{padding:0 16px;display:flex;flex-direction:column;gap:12px}
.cat-log-row{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.cat-log-name{font-size:14px;font-weight:600;font-family:'Syne',sans-serif;flex:1}
.num-input-wrap{display:flex;align-items:center;gap:6px}
.num-btn{width:30px;height:30px;border-radius:50%;background:var(--bg3);border:1px solid var(--border2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--text);transition:all .2s;flex-shrink:0}
.num-btn:active{transform:scale(.9);background:var(--accent);border-color:var(--accent)}
.num-val{font-size:16px;font-weight:700;font-family:'Syne',sans-serif;width:40px;text-align:center;color:var(--text)}
.total-log-card{margin:16px;background:linear-gradient(135deg,#6c63ff20,#6c63ff0a);border:1px solid #6c63ff35;border-radius:var(--radius);padding:16px;display:flex;align-items:center;justify-content:space-between}
.total-log-val{font-size:32px;font-weight:800;font-family:'Syne',sans-serif}
.total-log-label{font-size:12px;color:var(--text2)}
.warning-4hr{font-size:12px;color:var(--accent2);margin-top:4px}
.subject-chips{display:flex;flex-wrap:wrap;gap:8px;padding:0 16px}
.subject-chip{padding:8px 14px;border-radius:20px;font-size:13px;font-weight:600;font-family:'Syne',sans-serif;cursor:pointer;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);transition:all .2s}
.subject-chip.active{border-color:var(--accent);background:#6c63ff18;color:var(--accent)}
.subject-chip:active{transform:scale(.95)}
.log-note-wrap{padding:0 16px}
.log-submit-wrap{padding:16px}
.already-logged{text-align:center;padding:16px;color:var(--text2);font-size:13px}

/* ========== COMPARE PAGE ========== */
.compare-selectors{padding:0 16px;display:flex;gap:10px;margin-bottom:16px}
.compare-select{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;color:var(--text);font-size:16px;font-family:'Syne',sans-serif;cursor:pointer;outline:none;-webkit-appearance:none;appearance:none}
.compare-grid{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;padding:0 16px;margin-bottom:8px;align-items:center}
.compare-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;text-align:center}
.compare-val{font-size:20px;font-weight:800;font-family:'Syne',sans-serif;margin-bottom:3px}
.compare-label{font-size:10px;color:var(--text3)}
.compare-winner{font-size:9px;font-weight:700;text-transform:uppercase;margin-top:4px}
.compare-chart-wrap{padding:0 16px;margin-bottom:16px}

/* ========== ADMIN PAGE ========== */
.admin-section{padding:0 16px;margin-bottom:20px}
.admin-section-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);font-family:'Syne',sans-serif;margin-bottom:10px}
.target-proposal{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.users-table{display:flex;flex-direction:column;gap:8px}
.user-row{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;display:flex;align-items:center;gap:10px}
.user-row-info{flex:1;min-width:0}
.user-row-name{font-size:14px;font-weight:700;font-family:'Syne',sans-serif}
.user-row-meta{font-size:11px;color:var(--text3);margin-top:2px}
.user-row-actions{display:flex;gap:6px}
.icon-btn{width:32px;height:32px;border-radius:8px;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;font-size:14px}
.icon-btn:active{transform:scale(.9)}
.icon-btn.danger{background:#ff6b6b15;border-color:#ff6b6b30;color:var(--accent2)}

/* ========== HISTORY PAGE ========== */
.cycle-list{padding:0 16px;display:flex;flex-direction:column;gap:10px}
.cycle-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;cursor:pointer;transition:all .2s}
.cycle-card:active{transform:scale(.98)}
.cycle-title{font-size:15px;font-weight:700;font-family:'Syne',sans-serif;margin-bottom:4px}
.cycle-date{font-size:12px;color:var(--text2)}
.cycle-winner{font-size:12px;color:var(--accent3);margin-top:8px}

/* ========== MODALS ========== */

<script>
// ============================================================
// CONFIG
// ============================================================
const SUPABASE_URL = 'https://qlewwbwynsehkeqxmfki.supabase.co';
const SUPABASE_KEY = 'sb_publishable_1ymObuNYee11n8k9kmbs5Q_6sw427_n';
const ADMIN_USERNAMES = ['dishu','meghansh','mayuresh'];
const SUPERADMIN_USERNAME = 'dishu';
const MAX_USERS = 8;   // changed from 6 to 8 for your group
const MIN_HOURS = 4;
const SESSION_DAYS = 7;
const APP_VERSION = '1.0.2';

const CATEGORIES = ['School Study','YT Lectures','Lectures of Coaching','PYQ Practice','Question Practice','Self Study'];
const PCM_SUBJECTS = ['Physics','Chemistry','Maths'];
const COMMERCE_SUBJECTS = ['Accountancy','BST','Economics','English','Maths','PE'];

const AVATAR_COLORS = ['av0','av1','av2','av3','av4','av5'];
const CAT_COLORS = ['#6c63ff','#ff6b35','#06d6a0','#ffd166','#ff6b6b','#c77dff'];

const LEVEL_NAMES = ['Rookie','Grinder','Beast','Scholar','JEE Mode'];
const LEVEL_XP = [0,500,1500,3500,7000];
const BADGE_DEFS = [
  {id:'week7',name:'7-Day Streak 🔥',desc:'Studied 7 days in a row',check:(s)=>s.maxStreak>=7},
  {id:'week14',name:'14-Day Streak ⚡',desc:'14 days straight',check:(s)=>s.maxStreak>=14},
  {id:'day10',name:'10hr Day 💪',desc:'Logged 10+ hours in a day',check:(s)=>s.bestDay>=10},
  {id:'pyqGrind',name:'PYQ Grinder 📚',desc:'100+ hours of PYQ Practice',check:(s)=>s.catTotals['PYQ Practice']>=100},
  {id:'consistent',name:'Consistent ✅',desc:'Logged 20+ out of 30 days',check:(s)=>s.daysStudied>=20},
  {id:'grinder',name:'Total Grinder 🏆',desc:'200+ total hours',check:(s)=>s.totalHours>=200},
];

const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function safeNum(v) {
  const n = Number(v);
  return Number.isFinite(n) ? n : 0;
}

// ============================================================
// STATE
// ============================================================
let currentUser = null;
let allUsers = [];
let allLogs = [];
let activeCycle = null;
let countdowns = [];
let feedItems = [];
let pinnedMsg = null;
let dailyTarget = 6;
let targetProposal = null;
let viewMode = '30'; // '7' or '30'
let profileViewUser = null;
let appVersionSeen = null;
let lbFilter = 'monthly'; // 'today' | 'weekly' | 'monthly'
let catViewMode = 'total'; // 'today' | 'total'

// ============================================================
// INIT & SESSION
// ============================================================
async function init() {
  syncAppVersion();
  const session = getSession();
  if (session) {
    currentUser = session;
    await loadAppData();
    showMainApp();
  } else {
    checkMaxUsers();
  }
}

function getSession() {
  try {
    const s = localStorage.getItem('gh_session');
    if (!s) return null;
    const parsed = JSON.parse(s);
    if (Date.now() > parsed.expires) { localStorage.removeItem('gh_session'); return null; }
    return parsed.user;
  } catch { return null; }
}

function setSession(user) {
  localStorage.setItem('gh_session', JSON.stringify({
    user,
    expires: Date.now() + SESSION_DAYS * 86400000
  }));
}

function clearSession() {
  localStorage.removeItem('gh_session');
}

async function checkMaxUsers() {
  const { count } = await db.from('users').select('*', {count:'exact',head:true});
  const notice = document.getElementById('maxUsersNotice');
  const signupBtn = document.getElementById('signupTabBtn');
  const signupFields = document.getElementById('signupFields');

  if (count >= MAX_USERS) {
    if (notice) notice.classList.remove('hide');
    if (signupBtn) signupBtn.classList.add('hide');
    if (signupFields) signupFields.classList.add('hide');
    if (authMode === 'signup') switchAuthTab('login');
  } else {
    if (notice) notice.classList.add('hide');
    if (signupBtn) signupBtn.classList.remove('hide');
  }
}

// ============================================================
// AUTH
// ============================================================
let selectedStream = 'PCM';
let authMode = 'login';

function switchAuthTab(mode) {
  authMode = mode;
  document.getElementById('loginTabBtn').classList.toggle('active', mode==='login');
  document.getElementById('signupTabBtn').classList.toggle('active', mode==='signup');
  document.getElementById('signupFields').classList.toggle('hide', mode!=='signup');
  document.getElementById('authSubmitBtn').textContent = mode==='login' ? 'Login' : 'Create Account';
  document.getElementById('authError').textContent = '';
}

function selectStream(s) {
  selectedStream = s;
  ['PCM','Commerce','Other'].forEach(x => {
    document.getElementById('stream'+x).classList.toggle('active', x===s);
  });
  document.getElementById('otherSubjectsWrap').classList.toggle('hide', s!=='Other');
}

async function handleAuth() {
  const username = document.getElementById('authUsername').value.trim().toLowerCase();
  const password = document.getElementById('authPassword').value;
  const errEl = document.getElementById('authError');
  errEl.textContent = '';

  if (!username || !password) { errEl.textContent = 'Fill in all fields'; return; }

  const btn = document.getElementById('authSubmitBtn');
  btn.textContent = '...';
  btn.disabled = true;

  try {
    if (authMode === 'login') {
      const { data: rows, error } = await db.from('users').select('*').ilike('username', username).limit(1);
      if (error) throw error;
      const data = rows && rows.length > 0 ? rows[0] : null;
      if (!data) { errEl.textContent = 'User not found'; return; }
      if (data.password !== password) { errEl.textContent = 'Wrong password'; return; }
      const now = new Date().toISOString();
      const { error: loginError } = await db.from('users').update({ last_login: now }).eq('id', data.id);
      if (loginError) throw loginError;
      data.last_login = now;
      currentUser = data;
      setSession(data);
      await loadAppData();
      const hasOnboarded = localStorage.getItem('gh_onboarded_' + data.id);
      if (!hasOnboarded) { showPage('onboardingPage', true); } 
      else { showMainApp(); }
    } else {
      const { count, error: countError } = await db.from('users').select('*', { count: 'exact', head: true });
      if (countError) throw countError;
      if (count >= MAX_USERS) { errEl.textContent = 'Group is full (8 max). Login still works.'; return; }
      const { data: existingRows, error: existingError } = await db.from('users').select('id').ilike('username', username).limit(1);
      if (existingError) throw existingError;
      if (existingRows && existingRows.length > 0) { errEl.textContent = 'Username taken'; return; }
      let subjects = selectedStream === 'PCM' ? PCM_SUBJECTS : selectedStream === 'Commerce' ? COMMERCE_SUBJECTS : document.getElementById('otherSubjectsInput').value.split(',').map(s => s.trim()).filter(Boolean);
      const isAdmin = ADMIN_USERNAMES.includes(username);
      const isSuperadmin = username === SUPERADMIN_USERNAME;
      const now = new Date().toISOString();
      const { data, error } = await db.from('users').insert({
        username, password, stream: selectedStream, subjects: JSON.stringify(subjects),
        is_admin: isAdmin, is_superadmin: isSuperadmin,
        xp: 0, level: 0, created_at: now, last_login: now
      }).select().single();
      if (error) throw error;
      currentUser = data;
      setSession(data);
      await loadAppData();
      showPage('onboardingPage', true);
    }
  } catch (err) {
    console.error(err);
    errEl.textContent = 'Something went wrong. Try again.';
  } finally {
    btn.disabled = false;
    btn.textContent = authMode === 'login' ? 'Login' : 'Create Account';
  }
}

// ============================================================
// DATA LOADING
// ============================================================
async function loadAppData() {
  const [usersRes, cycleRes, countdownRes, feedRes, targetRes, pinnedRes] = await Promise.all([
    db.from('users').select('*').order('xp', {ascending:false}),
    db.from('cycles').select('*').eq('is_active', true).maybeSingle(),
    db.from('countdowns').select('*').order('date'),
    db.from('feed').select('*').order('created_at', {ascending:false}).limit(30),
    db.from('settings').select('*').eq('key','daily_target').maybeSingle(),
    db.from('settings').select('*').eq('key','pinned_msg').maybeSingle(),
  ]);

  allUsers = usersRes.data || [];
  activeCycle = cycleRes.data || null;
  countdowns = countdownRes.data || [];
  feedItems = feedRes.data || [];
  dailyTarget = targetRes.data ? Number(targetRes.data.value) : 6;
  pinnedMsg = pinnedRes.data ? pinnedRes.data.value : null;

  if (!activeCycle) {
    const now = new Date();
    const start = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
    const endD = new Date(now); endD.setDate(endD.getDate()+30);
    const end = `${endD.getFullYear()}-${String(endD.getMonth()+1).padStart(2,'0')}-${String(endD.getDate()).padStart(2,'0')}`;
    const { data } = await db.from('cycles').insert({start_date:start, end_date:end, is_active:true, name:'Cycle 1'}).select().single();
    activeCycle = data;
  }

  if (activeCycle) {
    const { data } = await db.from('logs').select('*').eq('cycle_id', activeCycle.id);
    allLogs = data || [];
  }

  if (currentUser) {
    const fresh = allUsers.find(u => u.id === currentUser.id);
    if (fresh) { currentUser = fresh; setSession(fresh); }
  }
}

// ============================================================
// NAVIGATION & ONBOARDING
// ============================================================
async function showPage(pageId, skipNav=false) {
  if (currentUser && (pageId === 'homePage' || pageId === 'leaderboardPage')) {
    try { await loadAppData(); } catch (err) { console.error('refresh failed', err); }
  }

  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const pageEl = document.getElementById(pageId);
  if (!pageEl) return;
  pageEl.classList.add('active');
  fixPages();

  const navMap = {homePage:'home',leaderboardPage:'leaderboard',profilePage:'profile',adminPage:'admin',historyPage:'history'};
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  if (navMap[pageId]) document.getElementById('nav-'+navMap[pageId])?.classList.add('active');

  switch(pageId) {
    case 'homePage': renderHome(); break;
    case 'leaderboardPage': renderLeaderboard(); break;
    case 'profilePage': profileViewUser = currentUser?.id; renderProfile(currentUser?.id); break;
    case 'logPage': renderLogPage(); break;
    case 'adminPage': renderAdmin(); break;
    case 'historyPage': renderHistory(); break;
  }
  window.scrollTo(0,0);
}

function showMainApp() {
  document.getElementById('bottomNav').style.display = 'block';
  showPage('homePage');
}

function showLogPage() {
  showPage('logPage');
}
function showComparePage() {
  showPage('comparePage', true);
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  renderComparePage();
}

function nextOnboard(step) {
  document.querySelectorAll('.onboard-step').forEach(s => s.classList.remove('active'));
  document.getElementById('onboard'+step).classList.add('active');
}
function finishOnboarding() {
  localStorage.setItem('gh_onboarded_'+currentUser.id, '1');
  showMainApp();
}

// ============================================================
// HOME PAGE
// ============================================================
function renderHome() {
  if (!currentUser) return;
  const hour = istHour();
  const greet = hour<12 ? 'Good morning' : hour<17 ? 'Good afternoon' : 'Good evening';
  document.getElementById('homeGreeting').textContent = greet+', '+capitalize(currentUser.username)+' 👋';
  document.getElementById('homeDate').textContent = formatISTDate(new Date());

  const today = todayStr();
  document.getElementById('todayCardDate').textContent = today;
  renderTodayMembers(today);

  const myLogToday = allLogs.find(l => l.user_id === currentUser.id && l.date === today);
  const nowHour = istHour();
  const reminderBadge = document.getElementById('logReminderBadge');
  if (!myLogToday && nowHour >= 21) { reminderBadge.classList.remove('hide'); }
  else { reminderBadge.classList.add('hide'); }

  const pinnedCard = document.getElementById('pinnedMsgCard');
  if (pinnedMsg) {
    pinnedCard.classList.remove('hide');
    document.getElementById('pinnedMsgText').textContent = pinnedMsg;
  } else { pinnedCard.classList.add('hide'); }

  renderCountdowns();
  renderFeed();
}

function renderTodayMembers(today) {
  const row = document.getElementById('todayMembersRow');
  const statusEl = document.getElementById('todayCardStatus');
  let loggedCount = 0;
  let html = '';
  allUsers.forEach(u => {
    const log = allLogs.find(l => l.user_id === u.id && l.date === today);
    const total = log ? (log.total_hours||0) : 0;
    let cls = 'pending', icon = '○';
    if (log) { loggedCount++; cls = total >= MIN_HOURS ? 'done' : 'partial'; icon = total >= MIN_HOURS ? '✓' : '~'; }
    html += `<div class="member-tick ${cls}">${icon} ${capitalize(u.username)}</div>`;
  });
  row.innerHTML = html;
  const total = allUsers.length;
  statusEl.textContent = loggedCount === 0 ? 'No one logged yet today' : loggedCount === total ? 'Everyone logged today! 🔥' : `${loggedCount}/${total} logged today`;
}

function renderCountdowns() {
  const row = document.getElementById('countdownsRow');
  const today = todayStr();
  if (countdowns.length === 0) {
    row.innerHTML = '<div class="empty-text" style="padding:12px;color:var(--text3);font-size:12px">No countdowns yet</div>';
    return;
  }
  row.innerHTML = countdowns.map(c => {
    const days = diffDaysIST(c.date, today);
    const color = days <= 7 ? 'var(--accent2)' : days <= 30 ? 'var(--accent3)' : 'var(--accent)';
    return `<div class="countdown-chip">
      <div class="countdown-days" style="color:${color}">${days > 0 ? days : 0}</div>
      <div class="countdown-name">${escapeHtml(c.name)}</div>
      <div class="countdown-sub">${days > 0 ? 'days left' : 'today!'}</div>
    </div>`;
  }).join('');
}

function renderFeed() {
  const list = document.getElementById('feedList');
  const recentCutoff = Date.now() - (3 * 86400000);
  const recentItems = feedItems.filter(item => !item.created_at || new Date(item.created_at).getTime() >= recentCutoff);
  if (recentItems.length === 0) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">No recent activity yet.</div></div>';
    return;
  }
  const reactionEmojis = ['🔥','😴','💀','👀'];
  list.innerHTML = recentItems.slice(0,15).map(item => {
    const user = allUsers.find(u => u.id === item.user_id);
    const uname = user ? capitalize(user.username) : '?';
    const avIdx = user ? (allUsers.indexOf(user) % 6) : 0;
    const reactions = safeJsonParse(item.reactions, {});
    const myName = currentUser?.username?.toLowerCase() || '';
    const lateNight = item.created_at ? istHour(item.created_at) >= 22 : false;
    return `<div class="feed-item">
      <div class="feed-top">
        <div style="display:flex;align-items:center;gap:8px">
          <div class="lb-avatar ${AVATAR_COLORS[avIdx]}" style="width:30px;height:30px;font-size:12px">${escapeHtml(uname[0] || '?')}</div>
          <div class="feed-name">${escapeHtml(uname)} ${lateNight ? '🌙' : ''}</div>
        </div>
        <div class="feed-time">${timeAgo(item.created_at)}</div>
      </div>
      <div class="feed-msg">${escapeHtml(item.message)}</div>
      ${item.note ? `<div class="feed-note">"${escapeHtml(item.note)}"</div>` : ''}
      <div class="feed-reactions">
        ${reactionEmojis.map(e => {
          const names = Array.isArray(reactions[e]) ? reactions[e] : [];
          const count = names.length;
          const active = names.includes(myName);
          const titleAttr = count > 0 ? ' title="' + escapeHtml(names.map(n => capitalize(n)).join(', ')) + '"' : '';
          const countHtml = count > 0 ? '<span>' + count + '</span>' : '';
          return '<div class="reaction-btn ' + (active?'active':'') + '" onclick="toggleReaction(\'' + item.id + '\',\'' + e + '\')"' + titleAttr + '>' + e + countHtml + '</div>';
        }).join('')}
      </div>
    </div>`;
  }).join('');
}

async function toggleReaction(feedId, emoji) {
  if (!currentUser) return;
  try {
    const item = feedItems.find(f => f.id === feedId);
    if (!item) return;
    const reactions = safeJsonParse(item.reactions, {});
    const myName = currentUser.username.toLowerCase();
    let names = Array.isArray(reactions[emoji]) ? [...reactions[emoji]] : [];
    if (names.includes(myName)) {
      names = names.filter(n => n !== myName);
    } else {
      names.push(myName);
    }
    reactions[emoji] = names;
    const { error } = await db.from('feed').update({ reactions: JSON.stringify(reactions) }).eq('id', feedId);
    if (error) throw error;
    item.reactions = JSON.stringify(reactions);
    renderFeed();
  } catch (err) {
    console.error(err);
    showToast('Reaction failed');
  }
}

// LEADERBOARD (with Daily/Weekly/Monthly filters)
// ============================================================
function setLbFilter(f) {
  lbFilter = f;
  renderLeaderboard();
}

function renderLeaderboard() {
  if (!currentUser) return;
  if (activeCycle) {
    document.getElementById('lbCycleLabel').textContent = activeCycle.name + ' · ' + activeCycle.start_date + ' → ' + activeCycle.end_date;
  }

  const filterEl = document.getElementById('lbFilterToggle');
  if (filterEl) {
    filterEl.innerHTML = `<div style="display:flex;background:var(--bg3);border-radius:var(--radius-sm);padding:3px">
      ${['today','weekly','monthly'].map(f => `
        <button onclick="setLbFilter('${f}')" style="flex:1;padding:7px;border-radius:7px;font-size:12px;font-weight:600;font-family:'Syne',sans-serif;cursor:pointer;border:none;transition:all .2s;background:${lbFilter===f?'var(--bg2)':'transparent'};color:${lbFilter===f?'var(--text)':'var(--text3)'};box-shadow:${lbFilter===f?'0 1px 4px #00000040':'none'}">${f.charAt(0).toUpperCase()+f.slice(1)}</button>
      `).join('')}
    </div>`;
  }

  const today = todayStr();
  const filteredLogs = allLogs.filter(l => {
    if (lbFilter === 'today') return l.date === today;
    if (lbFilter === 'weekly') return diffDaysIST(today, l.date) <= 6;
    return true;
  });

  const sorted = allUsers.map(u => {
    const uLogs = filteredLogs.filter(l => l.user_id === u.id);
    const totalHours = uLogs.reduce((s,l) => s + (l.total_hours||0), 0);
    const daysStudied = uLogs.filter(l => l.total_hours > 0).length;
    const avgPerDay = daysStudied > 0 ? totalHours / daysStudied : 0;
    const s = computeUserStats(u.id);
    const todayLog = allLogs.find(l => l.user_id === u.id && l.date === today);
    const todayHours = todayLog ? (todayLog.total_hours||0) : 0;
    const loggedToday = !!todayLog;
    return { ...u, filteredStats: { totalHours, daysStudied, avgPerDay, currentStreak: s.currentStreak, todayHours, loggedToday } };
  }).sort((a,b) => b.filteredStats.totalHours - a.filteredStats.totalHours);

  const totalGroupHours = sorted.reduce((s,u) => s + u.filteredStats.totalHours, 0);
  const maxStreak = sorted.length > 0 ? Math.max(...sorted.map(u => u.filteredStats.currentStreak), 0) : 0;
  const loggedTodayCount = sorted.filter(u => u.filteredStats.loggedToday).length;

  document.getElementById('lbStatsRow').innerHTML = `
    <div class="lb-stat-chip"><div class="lb-stat-val">${totalGroupHours.toFixed(0)}</div><div class="lb-stat-label">${lbFilter==='today'?'Today':lbFilter==='weekly'?'Week':'Cycle'} Hrs</div></div>

  const list = document.getElementById('leaderboardList');
  if (sorted.length === 0) { list.innerHTML = '<div class="empty"><div class="empty-icon">🏜️</div><div class="empty-text">No data yet</div></div>'; return; }

  list.innerHTML = sorted.map((u,i) => {
    const fs = u.filteredStats;
    const rankClass = i===0?'top1':i===1?'top2':i===2?'top3':'';
    const rankColor = i===0?'r1':i===1?'r2':i===2?'r3':'';
    const avIdx = allUsers.findIndex(x=>x.id===u.id) % 6;
    const below4 = fs.loggedToday && fs.todayHours < MIN_HOURS;
    return `<div class="lb-item ${rankClass}" onclick="viewUserProfile('${u.id}')">
      ${below4 ? '<div class="lb-below4">below 4hr</div>' : ''}
      <div class="lb-rank ${rankColor}">${i+1}</div>
      <div class="lb-avatar ${AVATAR_COLORS[avIdx]}">${capitalize(u.username)[0]}</div>
      <div class="lb-info">
        <div class="lb-name">${capitalize(u.username)} ${fs.currentStreak>=3?'🔥':''}</div>
        <div class="lb-meta">${getLevelName(u.xp||0)} · ${fs.daysStudied}d studied · avg ${fs.avgPerDay.toFixed(1)}h/d</div>

      <div class="lb-right">
        <div class="lb-hours">${fs.totalHours.toFixed(1)}</div>
        <div class="lb-hrs-label">hrs</div>
      </div>
    </div>`;
  }).join('');
}

function renderProfile(userId) {
  profileViewUser = userId || currentUser?.id;
  const user = allUsers.find(u => u.id === profileViewUser);
  if (!user) { document.getElementById('profileContent').innerHTML = '<div class="loader"><div class="spinner"></div></div>'; return; }

  const s = computeUserStats(user.id);
  const isMe = user.id === currentUser?.id;
  const avIdx = allUsers.indexOf(user) % 6;
  const lvl = getLevel(user.xp||0);
  const nextXP = LEVEL_XP[Math.min(lvl+1, LEVEL_XP.length-1)];
  const curXP = LEVEL_XP[lvl];
  const xpPct = lvl >= LEVEL_NAMES.length-1 ? 100 : Math.round(((user.xp||0)-curXP)/(nextXP-curXP)*100);
  const subjects = safeJsonParse(user.subjects, PCM_SUBJECTS);
  const badges = BADGE_DEFS.filter(b => b.check(s));

  let slumpHtml = '';
  if (isMe) {
    const last3 = getLast3DayAvg(user.id);
    const prev3 = getPrev3DayAvg(user.id);
    if (last3 < prev3 * 0.7 && prev3 > 0) {
      slumpHtml = `<div class="slump-card"><div style="font-size:13px;font-weight:700;font-family:'Syne',sans-serif;margin-bottom:4px">📉 Slump detected</div><div style="font-size:12px;color:var(--text2)">Your last 3 days avg: ${last3.toFixed(1)}h vs previous 3 days: ${prev3.toFixed(1)}h. Time to bounce back.</div></div>`;
    }
  }

  const heatmapHtml = renderHeatmap(user.id);

  const todayLog = allLogs.find(l => l.user_id === user.id && l.date === todayStr());
  const todayCats = todayLog ? safeJsonParse(todayLog.categories, {}) : {};
  const showDaily = catViewMode === 'today';
  const catSource = showDaily ? todayCats : s.catTotals;
  const catMax = Math.max(...CATEGORIES.map(c => catSource[c]||0), 1);
  const catBarsHtml = CATEGORIES.map((cat,i) => {
    const val = catSource[cat] || 0;
    const pct = Math.round(val/catMax*100);
    return `<div class="cat-bar-row">
      <div class="cat-bar-label" title="${escapeHtml(cat)}">${escapeHtml(cat)}</div>
      <div class="cat-bar-track"><div class="cat-bar-fill" style="width:${pct}%;background:${CAT_COLORS[i]}"></div></div>
      <div class="cat-bar-val">${val.toFixed ? val.toFixed(0) : val}h</div>
    </div>`;
  }).join('');

  const todayH = s.todayHours;
  const yesterdayH = s.yesterdayHours;
  const diff = todayH - yesterdayH;
  const diffColor = diff >= 0 ? 'var(--accent4)' : 'var(--accent2)';
  const vsHtml = `<div class="vs-yesterday">
    <div class="vs-card"><div class="vs-val" style="color:var(--accent)">${todayH.toFixed(1)}</div><div class="vs-label">Today</div></div>
    <div class="vs-card"><div class="vs-val" style="color:var(--text2)">${yesterdayH.toFixed(1)}</div><div class="vs-label">Yesterday</div></div>
    <div class="vs-card"><div class="vs-val" style="color:${diffColor}">${diff>=0?'+':''}${diff.toFixed(1)}</div><div class="vs-label">vs Yesterday</div></div>
  </div>`;

  const cycleDay = activeCycle ? diffDaysIST(todayStr(), activeCycle.start_date) + 1 : 0;
  let reportHtml = '';
  if (cycleDay >= 28) {
    const grade = computeGrade(s);
    reportHtml = `<div class="finale-card">
      <div class="finale-grade grade-${grade}">${grade}</div>
      <div style="font-size:15px;font-weight:700;font-family:'Syne',sans-serif;margin-bottom:6px">${getGradeLabel(grade)}</div>
      <div style="font-size:12px;color:var(--text2)">Cycle ending soon</div>
    </div>`;
  }

  const catTodayBg = catViewMode === 'today' ? 'var(--bg2)' : 'transparent';
  const catTodayColor = catViewMode === 'today' ? 'var(--text)' : 'var(--text3)';
  const catTotalBg = catViewMode === 'total' ? 'var(--bg2)' : 'transparent';
  const catTotalColor = catViewMode === 'total' ? 'var(--text)' : 'var(--text3)';
  const btnStyle = 'padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;font-family:Syne,sans-serif;cursor:pointer;border:none;';
  const catToggleHtml = '<div style="display:flex;background:var(--bg3);border-radius:8px;padding:2px">'
    + '<button onclick="setCatView(\'today\',\'' + user.id + '\')" style="' + btnStyle + 'background:' + catTodayBg + ';color:' + catTodayColor + '">Today</button>'
    + '<button onclick="setCatView(\'total\',\'' + user.id + '\')" style="' + btnStyle + 'background:' + catTotalBg + ';color:' + catTotalColor + '">Cycle</button>'
    + '</div>';

  const canEdit = isMe || currentUser?.is_admin || currentUser?.is_superadmin;
  const editLogHtml = canEdit
    ? '<div class="section-label" style="margin-top:8px">Edit Logs</div>'
      + '<div style="padding:0 16px;margin-bottom:16px;display:flex;flex-direction:column;gap:8px">'
      + renderEditableLogButtons(user.id)
      + '</div>'
    : '';

  const subjectsHtml = subjects.map(su => '<div class="badge badge-accent">' + escapeHtml(su) + '</div>').join('');
  const badgesHtml = badges.length
    ? badges.map(b => '<div class="badge badge-yellow" title="' + escapeHtml(b.desc) + '">' + escapeHtml(b.name) + '</div>').join('')
    : '<div style="font-size:12px;color:var(--text3)">No badges yet</div>';
  const logBtnHtml = isMe ? '<button class="btn btn-ghost btn-sm" onclick="showLogPage()">+ Log</button>' : '';

  document.getElementById('profileContent').innerHTML = `
    <div class="profile-header">
      <div class="profile-avatar ${AVATAR_COLORS[avIdx]}">${escapeHtml(capitalize(user.username)[0] || '?')}</div>
      <div style="flex:1;min-width:0">
        <div class="profile-name">${escapeHtml(capitalize(user.username))}</div>
        <div class="profile-level">${escapeHtml(getLevelName(user.xp||0))} · ${s.totalHours.toFixed(1)} total hours</div>
        <div class="profile-xp-bar"><div class="profile-xp-fill" style="width:${xpPct}%"></div></div>
      </div>
      ${logBtnHtml}
    </div>

    ${slumpHtml}
    ${reportHtml}

    <div class="stats-grid">
      <div class="stat-card"><div class="stat-val">${s.currentStreak}</div><div class="stat-label">Current Streak</div></div>
      <div class="stat-card"><div class="stat-val">${s.maxStreak}</div><div class="stat-label">Best Streak</div></div>
      <div class="stat-card"><div class="stat-val">${s.daysStudied}</div><div class="stat-label">Days Studied</div></div>
      <div class="stat-card"><div class="stat-val">${s.avgPerDay.toFixed(1)}</div><div class="stat-label">Avg/Day</div></div>
    </div>

    ${vsHtml}

    <div class="section-label">Heatmap</div>
    <div class="heatmap-grid">${heatmapHtml}</div>

    <div class="section-label" style="display:flex;align-items:center;justify-content:space-between;padding-right:16px">
      Category Breakdown
      ${catToggleHtml}
    </div>
    <div class="cat-bars">${catBarsHtml}</div>

    ${editLogHtml}

    <div class="section-label">Subjects</div>
    <div class="badges-row">${subjectsHtml}</div>

    <div class="section-label">Badges</div>
    <div class="badges-row">${badgesHtml}</div>
  `;
}

function setCatView(mode, userId) {

// ✅ FIXED: proper renderHeatmap function (was missing)
function renderHeatmap(userId) {
  const days = 30; // show last 30 days
  const cells = [];
  for (let i = days-1; i >= 0; i--) {
    const dateStr = istDateStr(-i);
    const log = allLogs.find(l => l.user_id === userId && l.date === dateStr);
    const h = log ? (log.total_hours||0) : 0;
    const heat = h===0 ? 0 : h<2?1 : h<4?2 : h<6?3 : h<8?4 : 5;
    cells.push(`<div class="heatmap-cell heat${heat}" title="${dateStr}: ${h}hrs" style="border-radius:6px"></div>`);
  }
  return cells.join('');
}

function renderEditableLogButtons(userId) {
  const today = todayStr();
  const yesterday = istDateStr(-1);
  const isAdmin = currentUser?.is_admin || currentUser?.is_superadmin;
  const isOwn = userId === currentUser?.id;

  const editableDates = isOwn ? [today, yesterday] : (isAdmin ? [today, yesterday] : []);

  if (editableDates.length === 0) return '';

  return editableDates.map(date => {
    const log = allLogs.find(l => l.user_id === userId && l.date === date);
    const label = date === today ? 'Today' : 'Yesterday';
    const hrs = log ? log.total_hours : 0;
    return `<div style="display:flex;align-items:center;justify-content:space-between;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px">
      <div>
        <div style="font-size:13px;font-weight:700;font-family:'Syne',sans-serif">${label} · ${date}</div>
        <div style="font-size:11px;color:var(--text3);margin-top:2px">${log ? hrs + 'h logged' : 'Not logged yet'}</div>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="openEditLogModal('${userId}','${date}')">${log ? 'Edit' : '+ Log'}</button>
    </div>`;
  }).join('');
}

async function openEditLogModal(userId, date) {
  const isOwn = userId === currentUser?.id;
  const isAdmin = currentUser?.is_admin || currentUser?.is_superadmin;
  if (!isOwn && !isAdmin) { showToast('Not allowed'); return; }

  const existingLog = allLogs.find(l => l.user_id === userId && l.date === date);
  const cats = existingLog ? safeJsonParse(existingLog.categories, {}) : {};
  const user = allUsers.find(u => u.id === userId);
  const userName = user ? capitalize(user.username) : '?';

  const catInputs = CATEGORIES.map((cat, idx) => {
    const val = cats[cat] || 0;
    return '<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)">'
      + '<div style="font-size:13px;font-weight:500">' + escapeHtml(cat) + '</div>'
      + '<div style="display:flex;align-items:center;gap:6px">'
      + '<div class="num-btn" onclick="editModalAdjust(' + idx + ',-0.5)">−</div>'
      + '<div id="em_cat_' + idx + '" style="font-size:15px;font-weight:700;width:36px;text-align:center">' + val + '</div>'
      + '<div class="num-btn" onclick="editModalAdjust(' + idx + ',0.5)">+</div>'
      + '</div></div>';
  }).join('');

  showModal(`
    <div class="modal-title">Edit Log · ${date}</div>
    <div style="font-size:12px;color:var(--text2);margin-bottom:12px">${isOwn ? '' : userName + ' · '}Editing ${date === todayStr() ? 'today' : 'yesterday'}</div>
    ${catInputs}
    <div class="input-group" style="margin-top:12px">
      <label class="input-label">Note</label>
      <input class="input" id="emNote" placeholder="Optional note..." value="${escapeHtml(existingLog?.note || '')}">
    </div>
    <div id="emTotal" style="text-align:right;font-size:20px;font-weight:800;font-family:'Syne',sans-serif;margin:12px 0;color:var(--accent)">0 hrs</div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-ghost btn-full" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary btn-full" onclick="saveEditLog('${userId}','${date}','${existingLog?.id||''}')">Save</button>
    </div>
  `);
  updateEditModalTotal();
}

function editModalAdjust(idx, delta) {
  const el = document.getElementById('em_cat_' + idx);
  if (!el) return;
  const cur = Number(el.textContent) || 0;
  const next = Math.max(0, Math.min(16, cur + delta));
  el.textContent = next % 1 === 0 ? next : next.toFixed(1);
  updateEditModalTotal();
}

function updateEditModalTotal() {
  let total = 0;
  CATEGORIES.forEach((cat, idx) => {
    const el = document.getElementById('em_cat_' + idx);
    total += Number(el?.textContent) || 0;
  });
  const el = document.getElementById('emTotal');
  if (el) el.textContent = (total % 1 === 0 ? total : total.toFixed(1)) + ' hrs';
}

async function saveEditLog(userId, date, existingLogId) {
  const categories = {};
  let totalHours = 0;
  CATEGORIES.forEach((cat, idx) => {
    const el = document.getElementById('em_cat_' + idx);
    const val = Number(el?.textContent) || 0;
    categories[cat] = val;
    totalHours += val;
  });
  const note = document.getElementById('emNote')?.value.trim() || '';

  try {
    if (existingLogId) {
      const { error } = await db.from('logs').update({
        total_hours: totalHours,
        categories: JSON.stringify(categories),
        note
      }).eq('id', existingLogId);
      if (error) throw error;
      const idx = allLogs.findIndex(l => l.id === existingLogId);
      if (idx !== -1) allLogs[idx] = { ...allLogs[idx], total_hours: totalHours, categories: JSON.stringify(categories), note };
    } else {
      if (!activeCycle?.id) throw new Error('No active cycle');
      const { data, error } = await db.from('logs').insert({
        user_id: userId,
        cycle_id: activeCycle.id,
        date,
        total_hours: totalHours,
        categories: JSON.stringify(categories),
        note
      }).select().single();
      if (error) throw error;
      if (data) allLogs.push(data);
    }
    closeModal();
    showToast('Log updated ✅');
    renderProfile(userId);
    renderLeaderboard();
  } catch (err) {
    console.error(err);
    showToast('Failed to save: ' + (err.message || ''));
  }
}

function viewUserProfile(userId) {
  profileViewUser = userId;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const pageEl = document.getElementById('profilePage');
  if (pageEl) pageEl.classList.add('active');
  fixPages();
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('nav-profile')?.classList.add('active');
  renderProfile(userId);
  window.scrollTo(0, 0);
}

// LOG PAGE
// ============================================================
let logValues = {};

function renderLogPage() {
  if (!currentUser) return;
  const today = todayStr();
  document.getElementById('logDateLabel').textContent = formatISTDate(new Date());

  const existingLog = allLogs.find(l => l.user_id === currentUser.id && l.date === today);
  document.getElementById('logPageContent').classList.remove('hide');
  document.getElementById('alreadyLoggedMsg').classList.add('hide');

  logValues = {};
  CATEGORIES.forEach(c => logValues[c] = 0);
  logValues['_subjects'] = [];

  document.getElementById('catLogRows').innerHTML = CATEGORIES.map(cat => `
    <div class="cat-log-row">
      <div class="cat-log-name">${escapeHtml(cat)}</div>
      <div class="num-input-wrap">
        <div class="num-btn" onclick="adjustLog('${cat}',-0.5)">−</div>
        <div class="num-val" id="logVal_${cat.replace(/\s/g,'_')}">0</div>
        <div class="num-btn" onclick="adjustLog('${cat}',0.5)">+</div>
      </div>
    </div>
  `).join('');

  if (existingLog) {
    const cats = safeJsonParse(existingLog.categories, {});
    CATEGORIES.forEach(c => {
      if (cats[c] !== undefined) {
        logValues[c] = Number(cats[c]) || 0;
        updateLogDisplay(c);
      }
    });
    const subs = safeJsonParse(existingLog.subjects, []);
    logValues['_subjects'] = Array.isArray(subs) ? [...subs] : [];
  }

  const subjects = safeJsonParse(currentUser.subjects, PCM_SUBJECTS);
  const activeSubjects = new Set(logValues['_subjects'] || []);
  document.getElementById('subjectChips').innerHTML = subjects.map(s => `
    <div class="subject-chip ${activeSubjects.has(s) ? 'active' : ''}" data-subject="${escapeHtml(s)}" id="sub_${s.replace(/\s/g,'_')}" onclick="toggleSubject('${s}')">${escapeHtml(s)}</div>
  `).join('');

  const note = document.getElementById('logNote');
  note.value = existingLog ? (existingLog.note || '') : '';
  note.placeholder = existingLog ? 'Add more hours for today...' : 'e.g. finished NLM, started waves...';

  updateTotalLog();
  renderSubjectChips();
}

function adjustLog(cat, delta) {
  logValues[cat] = Math.max(0, Math.min(16, (logValues[cat]||0) + delta));
  updateLogDisplay(cat);
  updateTotalLog();
}

function updateLogDisplay(cat) {
  const el = document.getElementById('logVal_'+cat.replace(/\s/g,'_'));
  if (el) el.textContent = logValues[cat] % 1 === 0 ? logValues[cat] : logValues[cat].toFixed(1);
}

function updateTotalLog() {
  const total = CATEGORIES.reduce((s,c)=>s+(logValues[c]||0),0);
  const totalEl = document.getElementById('totalLogVal');
  if (totalEl) totalEl.textContent = total % 1 === 0 ? total : total.toFixed(1);
  const warn = document.getElementById('totalLogWarning');
  if (warn) {
    if (total > 0 && total < MIN_HOURS) warn.classList.remove('hide');
    else warn.classList.add('hide');
  }
}

let selectedSubjects = [];
function toggleSubject(s) {
  if (!logValues['_subjects']) logValues['_subjects'] = [];
  const idx = logValues['_subjects'].indexOf(s);
  if (idx >= 0) logValues['_subjects'].splice(idx,1);
  else logValues['_subjects'].push(s);
  renderSubjectChips();
}

function renderSubjectChips() {
  const active = new Set(logValues['_subjects'] || []);
  document.querySelectorAll('.subject-chip').forEach(el => {
    const subj = el.dataset.subject || '';
    el.classList.toggle('active', active.has(subj));
  });
}

async function submitLog() {
  const btn = document.getElementById('logSubmitBtn');
  btn.disabled = true;
  btn.textContent = 'Saving...';

  try {
    const today = todayStr();

    if (!activeCycle?.id) {
      await loadAppData();
    }
    if (!activeCycle?.id) {
      throw new Error('No active cycle found.');
    }

    const { data: existingLog } = await db
      .from('logs')
      .select('*')
      .eq('user_id', currentUser.id)
      .eq('cycle_id', activeCycle.id)
      .eq('date', today)
      .maybeSingle();

    let oldCategories = {};
    let oldSubjects = [];
    let oldHours = 0;

    if (existingLog) {
      oldCategories = safeJsonParse(existingLog.categories, {});
      oldSubjects = safeJsonParse(existingLog.subjects, []);
      oldHours = Number(existingLog.total_hours || 0);
    }

    const addedCategories = {};
    let addedHours = 0;

    CATEGORIES.forEach(cat => {
      const el = document.getElementById('logVal_' + cat.replace(/\s/g,'_'));
      const val = Number(el?.textContent || 0);
      addedCategories[cat] = val;
      addedHours += val;
    });

    const finalCategories = {};
    CATEGORIES.forEach(cat => {
      finalCategories[cat] = Number(oldCategories[cat] || 0) + Number(addedCategories[cat] || 0);
    });

    const finalHours = oldHours + addedHours;

    const selectedSubjects = [
      ...document.querySelectorAll('.subject-chip.active')
    ].map(x => x.dataset.subject).filter(Boolean);

    const finalSubjects = [
      ...new Set([...(Array.isArray(oldSubjects) ? oldSubjects : []), ...selectedSubjects])
    ];

    const note = (document.getElementById('logNote')?.value || '').trim();

    if (existingLog) {
      const { error } = await db
        .from('logs')
        .update({
          total_hours: finalHours,
          categories: JSON.stringify(finalCategories),
          subjects: JSON.stringify(finalSubjects),
          note
        })
        .eq('id', existingLog.id);

      if (error) throw error;
    } else {
      const { error } = await db
        .from('logs')
        .insert({
          user_id: currentUser.id,
          cycle_id: activeCycle.id,
          date: today,
          total_hours: finalHours,
          categories: JSON.stringify(finalCategories),
          subjects: JSON.stringify(finalSubjects),
          note
        });

      if (error) throw error;
    }

    const xpGain = Math.round(addedHours * 10);

    await db
      .from('users')
      .update({
        xp: (currentUser.xp || 0) + xpGain
      })
      .eq('id', currentUser.id);

    await db
      .from('feed')
      .insert({
        user_id: currentUser.id,
        message: `${capitalize(currentUser.username)} logged ${finalHours.toFixed(1)}hrs 🔥`,
        note
      });

    await loadAppData();

    renderHome();
    renderLeaderboard();
    renderProfile(currentUser.id);
    renderAdmin();

    showToast(`+${xpGain} XP 🔥 Logged!`);

    const noteEl = document.getElementById('logNote');
    if (noteEl) noteEl.value = '';

    logValues = {};
    CATEGORIES.forEach(cat => {
      logValues[cat] = 0;
    });

  } catch (err) {
    console.error(err);
    showToast(err.message || 'Failed to log. Try again.');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Submit Log 🔥';
  }
}

      </div>
      ${isAdmin ? `<button class="btn btn-ghost btn-sm" onclick="openTargetModal()">Change</button>` : ''}
    </div>`;

  let countdownHtml = countdowns.map(c => {
    const daysLeft = Math.max(0, diffDaysIST(c.date, today));
    return `<div class="user-row">
      <div class="user-row-info"><div class="user-row-name">${c.name}</div><div class="user-row-meta">${c.date} · ${daysLeft > 0 ? daysLeft + ' days left' : 'Today!'}</div></div>
      ${isAdmin ? `<div class="user-row-actions"><div class="icon-btn danger" onclick="deleteCountdown('${c.id}')">🗑</div></div>` : ''}
    </div>`;
  }).join('') || '<div style="font-size:13px;color:var(--text3);padding:8px 0">No countdowns yet</div>';

  let pinnedHtml = isAdmin ? `
    <div style="display:flex;flex-direction:column;gap:8px">
      <div style="font-size:13px;color:var(--text2)">${pinnedMsg ? 'Pinned: ' + escapeHtml(pinnedMsg) : 'No pinned message yet'}</div>
      <button class="btn btn-ghost btn-sm" onclick="openPinnedModal()">Edit pinned message</button>
    </div>` : `<div style="font-size:13px;color:var(--text2)">${pinnedMsg || 'No pinned message'}</div>`;

  let notLoggedHtml = notLoggedToday.length === 0 ? '<div style="font-size:13px;color:var(--accent4)">Everyone logged today ✅</div>' :
    notLoggedToday.map(u => `<div class="badge badge-red">${capitalize(u.username)}</div>`).join(' ');

  el.innerHTML = `
    <div class="admin-section">
      <div class="admin-section-title">Daily Target</div>
      ${targetHtml}
    </div>

    <div class="admin-section">
      <div class="admin-section-title">Pinned Message</div>
      ${pinnedHtml}
    </div>

    <div class="admin-section">
      <div class="admin-section-title">Countdowns</div>
      <div style="display:flex;gap:8px;margin-bottom:12px">
        ${isAdmin ? `<button class="btn btn-ghost btn-sm" onclick="openCountdownModal()">+ Add</button>` : ''}
      </div>
      <div class="users-table">${countdownHtml}</div>
    </div>

    <div class="admin-section">
      <div class="admin-section-title">Who hasn't logged today</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px">${notLoggedHtml}</div>
    </div>

    ${currentUser.is_superadmin ? `<div class="admin-section"><button class="btn btn-primary btn-full" onclick="showSuperadmin()">👑 Super Admin Panel</button></div>` : ''}
  `;
}

function openTargetModal() {
  showModal(`

      <input class="input" id="targetInput" type="number" min="1" step="0.5" value="${dailyTarget}">

    <button class="btn btn-primary btn-full" onclick="saveDailyTarget()">Save</button>
  `);
}

async function saveDailyTarget() {
  const input = document.getElementById('targetInput');
  const val = Number(input?.value);
  if (!Number.isFinite(val) || val < 1) { showToast('Enter a valid target'); return; }
  const { error } = await db.from('settings').upsert({ key: 'daily_target', value: String(val) });
  if (error) { showToast('Failed to save target'); return; }
  dailyTarget = val;
  closeModal();
  showToast('Daily target updated to ' + dailyTarget + 'h');
  renderAdmin();
}

async function openPinnedModal() {
  showModal(`
    <div class="modal-title">Pin a message</div>
    <div class="input-group">
      <label class="input-label">Message</label>
      <textarea class="input" id="pinnedInput" rows="4" maxlength="180" placeholder="Write a short message for the group...">${escapeHtml(pinnedMsg || '')}</textarea>
    </div>
    <div style="height:10px"></div>
    <div style="font-size:12px;color:var(--text3);line-height:1.5">Keep it short and clear. Everyone will see it on the home screen.</div>
    <div style="height:16px"></div>
    <button class="btn btn-primary btn-full" onclick="savePinned()">Save pinned message</button>
  `);
}

async function savePinned() {
  const input = document.getElementById('pinnedInput');
  const val = input ? input.value.trim() : '';
  const prev = pinnedMsg;
  pinnedMsg = val || null;
  try {
    if (val) {
      const { error } = await db.from('settings').upsert({ key: 'pinned_msg', value: val });
      if (error) throw error;
    } else {
      const { error } = await db.from('settings').delete().eq('key', 'pinned_msg');
      if (error) throw error;
    }
    closeModal();
    showToast('Pinned message saved ✅');
    renderAdmin();
    renderHome();
  } catch (err) {
    pinnedMsg = prev;
    showToast('Failed to save pinned message');
  }
}

function openCountdownModal() {

async function addCountdown() {
  const name = document.getElementById('cdName')?.value.trim();
  const date = document.getElementById('cdDate')?.value;
  if (!name) { showToast('Enter a countdown name'); return; }
  if (!date || !/^\d{4}-\d{2}-\d{2}$/.test(date)) { showToast('Invalid date format'); return; }
  const { data, error } = await db.from('countdowns').insert({ name, date }).select().single();
  if (error) { showToast('Failed to add countdown'); return; }
  if (data) countdowns.push(data);
  closeModal();
  renderAdmin();
  renderCountdowns();
  showToast('Countdown added!');
}

async function deleteCountdown(id) {
  showConfirmModal({
    title: 'Delete Countdown',
    message: 'Delete this countdown?',
    confirmText: 'Delete',
    danger: true,
    onConfirm: async () => {
      const { error } = await db.from('countdowns').delete().eq('id', id);
      if (error) { showToast('Failed to delete countdown'); return; }
      countdowns = countdowns.filter(c => c.id !== id);
      showToast('Deleted');
      renderAdmin();
    }
  });
}

function renderCompare() {
  const aId = document.getElementById('compareA').value;
  const bId = document.getElementById('compareB').value;
  const userA = allUsers.find(u=>u.id===aId);
  const userB = allUsers.find(u=>u.id===bId);
  if (!userA || !userB) return;

  const sA = computeUserStats(aId);
  const sB = computeUserStats(bId);

  const metrics = [
    { label:'Total Hours', a:sA.totalHours.toFixed(1), b:sB.totalHours.toFixed(1), winner: compareMetricValues(sA.totalHours, sB.totalHours, getMetricReachedDate(aId, 'totalHours', sA.totalHours), getMetricReachedDate(bId, 'totalHours', sB.totalHours)) },
    { label:'Streak 🔥', a:sA.currentStreak, b:sB.currentStreak, winner: compareMetricValues(sA.currentStreak, sB.currentStreak, getMetricReachedDate(aId, 'currentStreak', sA.currentStreak), getMetricReachedDate(bId, 'currentStreak', sB.currentStreak)) },
    { label:'Avg/Day', a:sA.avgPerDay.toFixed(1), b:sB.avgPerDay.toFixed(1), winner: compareMetricValues(sA.avgPerDay, sB.avgPerDay, getMetricReachedDate(aId, 'avgPerDay', sA.avgPerDay), getMetricReachedDate(bId, 'avgPerDay', sB.avgPerDay)) },
    { label:'Best Day', a:sA.bestDay.toFixed(1), b:sB.bestDay.toFixed(1), winner: compareMetricValues(sA.bestDay, sB.bestDay, getMetricReachedDate(aId, 'bestDay', sA.bestDay), getMetricReachedDate(bId, 'bestDay', sB.bestDay)) },
    { label:'Consistency', a:sA.consistencyScore+'%', b:sB.consistencyScore+'%', winner: compareMetricValues(sA.consistencyScore, sB.consistencyScore, getMetricReachedDate(aId, 'consistencyScore', sA.consistencyScore), getMetricReachedDate(bId, 'consistencyScore', sB.consistencyScore)) },
    { label:'Days Studied', a:sA.daysStudied, b:sB.daysStudied, winner: compareMetricValues(sA.daysStudied, sB.daysStudied, getMetricReachedDate(aId, 'daysStudied', sA.daysStudied), getMetricReachedDate(bId, 'daysStudied', sB.daysStudied)) },
  ];

  const aAvIdx = allUsers.indexOf(userA) % 6;
  const bAvIdx = allUsers.indexOf(userB) % 6;

  document.getElementById('compareContent').innerHTML = `
    <div style="padding:0 16px;display:flex;gap:10px;margin-bottom:16px">
      <div style="flex:1;text-align:center">
        <div class="lb-avatar ${AVATAR_COLORS[aAvIdx]}" style="margin:0 auto 4px;width:44px;height:44px">${escapeHtml(capitalize(userA.username)[0] || '?')}</div>
        <div style="font-size:14px;font-weight:700">${escapeHtml(capitalize(userA.username))}</div>
      </div>
      <div style="flex:1;text-align:center">
        <div class="lb-avatar ${AVATAR_COLORS[bAvIdx]}" style="margin:0 auto 4px;width:44px;height:44px">${escapeHtml(capitalize(userB.username)[0] || '?')}</div>
        <div style="font-size:14px;font-weight:700">${escapeHtml(capitalize(userB.username))}</div>
      </div>
    </div>
    ${metrics.map(m => `
      <div class="compare-grid">
        <div class="compare-card" style="${m.winner==='a'?'border-color:var(--accent)':''}">
          <div class="compare-val" style="color:${m.winner==='a'?'var(--accent)':'var(--text)'}">${m.a}</div>
          ${m.winner==='a'?'<div class="compare-winner" style="color:var(--accent)">WINNING</div>':''}
        </div>
        <div style="display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text3);text-align:center;white-space:nowrap;padding:0 4px">${m.label}</div>
        <div class="compare-card" style="${m.winner==='b'?'border-color:var(--accent)':''}">
          <div class="compare-val" style="color:${m.winner==='b'?'var(--accent)':'var(--text)'}">${m.b}</div>
          ${m.winner==='b'?'<div class="compare-winner" style="color:var(--accent)">WINNING</div>':''}
        </div>
      </div>
    `).join('')}
    <div class="compare-chart-wrap"><canvas id="compareChart"></canvas></div>
  `;

  setTimeout(() => {
    const ctx = document.getElementById('compareChart');
    if (!ctx) return;
    const existing = Chart.getChart(ctx);
    if (existing) existing.destroy();
    const labels = CATEGORIES.map(c=>c.length>12?c.slice(0,12)+'…':c);
    new Chart(ctx, {
      type: 'radar',
      data: {
        labels,
        datasets: [
          {label: capitalize(userA.username), data: CATEGORIES.map(c=>sA.catTotals[c]||0), backgroundColor:'#6c63ff22', borderColor:'#6c63ff', pointBackgroundColor:'#6c63ff', borderWidth:2},
          {label: capitalize(userB.username), data: CATEGORIES.map(c=>sB.catTotals[c]||0), backgroundColor:'#ff6b3522', borderColor:'#ff6b35', pointBackgroundColor:'#ff6b35', borderWidth:2}
        ]
      },
      options: {plugins:{legend:{labels:{color:'#9090a8',font:{size:11}}}}, scales:{r:{grid:{color:'#ffffff10'},ticks:{display:false},pointLabels:{color:'#9090a8',font:{size:10}}}}, responsive:true, maintainAspectRatio:false}
    });
  }, 100);
}

async function renderHistory() {

  document.getElementById('historyContent').innerHTML = `

        const isActive = c.is_active;
        return `<div class="cycle-card" onclick="viewCycle('${c.id}')">
          <div class="cycle-title">${c.name} ${isActive ? '<span class="badge badge-green" style="font-size:10px">Active</span>' : ''}</div>
          <div class="cycle-date">${c.start_date} → ${c.end_date || 'ongoing'}</div>
        </div>`;
      }).join('')}
    </div>
    ${currentUser.is_superadmin ? `<div style="padding:16px"><button class="btn btn-danger btn-full" onclick="startNewCycle()">🔄 Start New Cycle</button></div>` : ''}

async function startNewCycle() {
  showConfirmModal({
    title: 'Start New Cycle',
    message: 'This will close the current cycle and start a fresh one from today.',
    confirmText: 'Start Cycle',
    danger: true,
    onConfirm: async () => {
      if (activeCycle) {
        const { error } = await db.from('cycles').update({ is_active: false, end_date: todayStr() }).eq('id', activeCycle.id);
        if (error) { showToast('Failed to close old cycle'); return; }
      }
      const { count, error: countError } = await db.from('cycles').select('*', { count: 'exact', head: true });
      if (countError) { showToast('Failed to start new cycle'); return; }
      const newName = 'Cycle ' + ((count || 0) + 1);
      const start = todayStr();
      const end = istDateStr(30);
      const { data, error } = await db.from('cycles').insert({ name: newName, start_date: start, end_date: end, is_active: true }).select().single();
      if (error) { showToast('Failed to start new cycle'); return; }
      activeCycle = data;
      await loadAppData();
      showToast('New cycle started! 🔥');
      renderHistory();
      renderAdmin();
    }
  });
}

async function viewCycle(cycleId) {
  showModal(`<div class="modal-title">Cycle Stats</div><div class="loader"><div class="spinner"></div></div>`);
  const [logsRes, cycleRes] = await Promise.all([
    db.from('logs').select('*').eq('cycle_id', cycleId),
    db.from('cycles').select('*').eq('id', cycleId).single()
  ]);
  const logs = logsRes.data || [];
  const cycle = cycleRes.data;
  if (!cycle) return;

  const userStats = allUsers.map(u => {
    const uLogs = logs.filter(l=>l.user_id===u.id);
    const total = uLogs.reduce((s,l)=>s+(l.total_hours||0),0);
    const grade = computeGradeFromLogs(uLogs, cycle);
    return {user:u, total, grade};
  }).sort((a,b)=>b.total-a.total);

  showModal(`
    <div class="modal-title">${cycle.name} Final Results</div>
    <div style="font-size:12px;color:var(--text2);margin-bottom:16px">${cycle.start_date} → ${cycle.end_date||'ongoing'}</div>
    ${userStats.map((s,i)=>`
      <div class="user-row" style="margin-bottom:8px">
        <div style="font-size:16px;font-weight:800;font-family:'Syne',sans-serif;color:var(--text3);width:24px">${i+1}</div>
        <div class="user-row-info">
          <div class="user-row-name">${capitalize(s.user.username)}</div>
          <div class="user-row-meta">${s.total.toFixed(1)} hours</div>
        </div>
        <div class="finale-grade grade-${s.grade}" style="font-size:28px;line-height:1">${s.grade}</div>
      </div>
    `).join('')}
    <button class="btn btn-ghost btn-full" style="margin-top:8px" onclick="closeModal()">Close</button>
  `);
}

function saEditUser(userId) {
  const user = allUsers.find(u => u.id === userId);
  if (!user) return;

  showModal(`
    <div class="modal-title">Edit User</div>
    <div class="input-group">
      <label class="input-label">Field</label>
      <select class="input" id="saEditField">
        <option value="username">Username</option>
        <option value="password">Password</option>
      </select>
    </div>
    <div style="height:12px"></div>
    <div class="input-group">
      <label class="input-label">New Value</label>
      <input class="input" id="saEditValue" placeholder="Enter new value">
    </div>
    <div style="height:16px"></div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-ghost btn-full" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary btn-full" id="saEditSave">Save</button>
    </div>
  `);

  const fieldEl = document.getElementById('saEditField');
  const valueEl = document.getElementById('saEditValue');
  const saveBtn = document.getElementById('saEditSave');

  const sync = () => {
    const field = fieldEl.value;
    valueEl.type = field === 'password' ? 'password' : 'text';
    valueEl.value = '';
    valueEl.placeholder = field === 'username' ? 'new username' : 'new password';
  };

  fieldEl.addEventListener('change', sync);
  sync();

  saveBtn.onclick = async () => {
    const field = fieldEl.value;
    const val = valueEl.value.trim();
    if (!val) { showToast('Enter a value'); return; }
    const update = {};
    if (field === 'username') update.username = val.toLowerCase();
    if (field === 'password') update.password = val;
    if (!update.username && !update.password) return;
    const { error } = await db.from('users').update(update).eq('id', userId);
    if (error) { showToast('Update failed'); return; }
    Object.assign(user, update);
    closeModal();
    showToast('Updated!');
    renderSuperadminContent();
  };
}

async function saToggleAdmin(userId) {
  const user = allUsers.find(u=>u.id===userId);
  if (!user || user.is_superadmin) { showToast("Can't change superadmin"); return; }
  const newVal = !user.is_admin;
  await db.from('users').update({is_admin: newVal}).eq('id', userId);
  user.is_admin = newVal;
  showToast(newVal ? 'Made admin 🛠' : 'Removed admin');
  renderSuperadminContent();
}

async function saDeleteUser(userId) {
  const user = allUsers.find(u=>u.id===userId);
  if (!user || user.is_superadmin) { showToast("Can't delete superadmin"); return; }
  showConfirmModal({
    title: 'Delete User',
    message: `Delete ${capitalize(user.username)}?`,
    confirmText: 'Delete',
    danger: true,
    onConfirm: async () => {
      const { error } = await db.from('users').delete().eq('id', userId);
      if (error) { showToast('Delete failed'); return; }
      allUsers = allUsers.filter(u=>u.id!==userId);
      showToast('Deleted');
      renderSuperadminContent();
    }
  });
}

async function saResetAllXP() {
  showConfirmModal({
    title: 'Reset All XP',
    message: 'This will reset XP for every user. This cannot be undone.',
    confirmText: 'Reset XP',
    danger: true,
    onConfirm: async () => {
      const { error } = await db.from('users').update({xp:0}).gte('xp', 0);
      if (error) { showToast('XP reset failed'); return; }
      allUsers.forEach(u => u.xp = 0);
      if (currentUser) { currentUser.xp = 0; setSession(currentUser); }
      showToast('XP reset!');
      renderSuperadminContent();
    }

}

          </div>
          <div class="user-row-actions" style="flex-shrink:0">
            <div class="icon-btn" onclick="saEditLog('${log.id}','${userId}')" title="Edit">✏️</div>
            <div class="icon-btn danger" onclick="saDeleteLog('${log.id}','${userId}')" title="Delete">🗑</div>
          </div>
        </div>
      </div>`;
