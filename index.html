  showModal(`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <div class="modal-title" style="margin-bottom:0">Logs — ${capitalize(user.username)}</div>
      <span style="font-size:12px;color:var(--text3)">${logs.length} entries</span>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px;max-height:60vh;overflow-y:auto">
      ${rows}
    </div>
    <div style="height:16px"></div>
    <button class="btn btn-ghost btn-full" onclick="closeModal()">Close</button>
  `);
}

async function saDeleteLog(logId, userId) {
  if (!currentUser?.is_superadmin) { showToast('Super admin only'); return; }
  showConfirmModal({
    title: 'Delete Log',
    message: 'Permanently delete this log entry? This cannot be undone.',
    confirmText: 'Delete',
    danger: true,
    onConfirm: async () => {
      const { error } = await db.from('logs').delete().eq('id', logId);
      if (error) { showToast('Failed to delete log'); return; }
      allLogs = allLogs.filter(l => l.id !== logId);
      showToast('Log deleted ✅');
      await saManageLogs(userId);
    }
  });
}

async function saEditLog(logId, userId) {
  if (!currentUser?.is_superadmin) { showToast('Super admin only'); return; }

  const { data: log, error } = await db.from('logs').select('*').eq('id', logId).single();
  if (error || !log) { showToast('Log not found'); return; }

  const cats = safeJsonParse(log.categories, {});

  const catInputs = CATEGORIES.map((cat, idx) => {
    return '<div class="cat-log-row" style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:8px">'
      + '<div class="cat-log-name" style="font-size:13px;font-weight:600">' + escapeHtml(cat) + '</div>'
      + '<input class="input input-small" style="width:70px;text-align:center" type="number" min="0" max="24" step="0.5" id="sacat_' + idx + '" value="' + (cats[cat] || 0) + '">'
      + '</div>';
  }).join('');

  showModal(`
    <div class="modal-title">Edit Log · ${log.date}</div>
    <div class="input-group" style="margin-bottom:14px">
      <label class="input-label">Total Hours</label>
      <input class="input" id="saEditHours" type="number" min="0" max="24" step="0.5" value="${log.total_hours || 0}">
    </div>
    <div class="admin-section-title" style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:8px">Category Breakdown</div>
    ${catInputs}
    <div class="input-group" style="margin-top:8px;margin-bottom:16px">
      <label class="input-label">Note</label>
      <textarea class="input" id="saEditNote" rows="2" maxlength="200" placeholder="Optional note...">${escapeHtml(log.note || '')}</textarea>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-ghost btn-full" onclick="saManageLogs('${userId}')">Cancel</button>
      <button class="btn btn-primary btn-full" onclick="saEditLogSave('${logId}','${userId}')">Save Changes</button>
    </div>
  `);
}

async function saEditLogSave(logId, userId) {
  if (!currentUser?.is_superadmin) { showToast('Super admin only'); return; }

  const totalHours = Number(document.getElementById('saEditHours')?.value) || 0;
  const note = document.getElementById('saEditNote')?.value.trim() || '';
  const categories = {};
  CATEGORIES.forEach((cat, idx) => {
    const el = document.getElementById('sacat_' + idx);
    const val = Number(el?.value) || 0;
    if (val > 0) categories[cat] = val;
  });

  const { error } = await db.from('logs').update({
    total_hours: totalHours,
    categories: JSON.stringify(categories),
    note
  }).eq('id', logId);

  if (error) { showToast('Failed to save log'); return; }

  const idx = allLogs.findIndex(l => l.id === logId);
  if (idx !== -1) {
    allLogs[idx] = { ...allLogs[idx], total_hours: totalHours, categories: JSON.stringify(categories), note };
  }

  showToast('Log updated ✅');
  renderHome();
  renderLeaderboard();
  renderAdmin();
  await saManageLogs(userId);
}

function downloadBackup() {
  const backup = {
    exported_at: new Date().toISOString(),
    app_version: APP_VERSION,
    users: allUsers,
    logs: allLogs,
    activeCycle,
    countdowns,
    feed: feedItems,

  a.download = `grind-house-backup-${todayStr()}.json`;

// ============================================================
// STATS HELPERS
// ============================================================
function computeUserStats(userId) {
  const userLogs = allLogs.filter(l => l.user_id === userId);
  const today = todayStr();
  const yStr = istDateStr(-1);

  const totalHours = userLogs.reduce((s,l) => s + (l.total_hours||0), 0);
  const daysStudied = userLogs.filter(l => l.total_hours > 0).length;
  const bestDay = Math.max(0, ...userLogs.map(l => l.total_hours||0));
  const avgPerDay = daysStudied > 0 ? totalHours / daysStudied : 0;

  const todayLog = userLogs.find(l => l.date === today);
  const todayHours = todayLog ? (todayLog.total_hours||0) : 0;
  const loggedToday = !!todayLog;

  const yesterdayLog = userLogs.find(l => l.date === yStr);
  const yesterdayHours = yesterdayLog ? (yesterdayLog.total_hours||0) : 0;

  const currentStreak = computeCurrentStreak(userId);
  const maxStreak = computeMaxStreak(userId);

  const cycleDays = activeCycle ? Math.max(1, diffDaysIST(today, activeCycle.start_date) + 1) : 1;
  const consistencyScore = Math.round(daysStudied / Math.min(cycleDays, 30) * 100);

  const catTotals = {};
  CATEGORIES.forEach(c => catTotals[c] = 0);
  userLogs.forEach(l => {
    if (l.categories) {
      const cats = safeJsonParse(l.categories, {});
      CATEGORIES.forEach(c => catTotals[c] += cats[c] || 0);
    }
  });

  let momentumScore = 0;
  for (let i=0; i<7; i++) {
    const dStr = istDateStr(-i);
    const log = userLogs.find(l=>l.date===dStr);
    momentumScore += (log ? log.total_hours||0 : 0) * (7-i);
  }
  momentumScore = Math.round(momentumScore / 28);

  return { totalHours, daysStudied, bestDay, avgPerDay, todayHours, loggedToday, yesterdayHours, currentStreak, maxStreak, consistencyScore, catTotals, momentumScore };
}

function computeCurrentStreak(userId) {
  let streak = 0;
  const todayLogged = allLogs.find(l => l.user_id===userId && l.date===todayStr() && l.total_hours>0);
  const startOffset = todayLogged ? 0 : 1;
  for (let i=startOffset; i<31; i++) {
    const dStr = istDateStr(-i);
    const log = allLogs.find(l => l.user_id===userId && l.date===dStr);
    if (log && log.total_hours > 0) streak++;
    else break;
  }
  return streak;
}

function computeMaxStreak(userId) {
  const dates = allLogs.filter(l=>l.user_id===userId&&l.total_hours>0).map(l=>l.date).sort();
  if (!dates.length) return 0;
  let max = 1, cur = 1;
  for (let i=1; i<dates.length; i++) {
    const diff = diffDaysIST(dates[i], dates[i-1]);
    if (diff === 1) {
      cur++;
      max = Math.max(max, cur);
    } else {
      cur = 1;
    }
  }
  return max;
}

function getLast3DayAvg(userId) {
  let total = 0;
  for (let i=0; i<3; i++) {
    const dStr = istDateStr(-i);
    const log = allLogs.find(l=>l.user_id===userId&&l.date===dStr);
    total += log ? log.total_hours||0 : 0;
  }
  return total / 3;
}

function getPrev3DayAvg(userId) {
  let total = 0;
  for (let i=3; i<6; i++) {
    const dStr = istDateStr(-i);
    const log = allLogs.find(l=>l.user_id===userId&&l.date===dStr);
    total += log ? log.total_hours||0 : 0;
  }
  return total / 3;
}

function getLevel(xp) {
  let lvl = 0;
  for (let i=LEVEL_XP.length-1; i>=0; i--) { if (xp >= LEVEL_XP[i]) { lvl = i; break; } }
  return lvl;
}

function getLevelName(xp) {
  return LEVEL_NAMES[getLevel(xp)];
}

function computeGrade(s) {
  const score = (s.consistencyScore * 0.4) + (Math.min(s.totalHours/200*100,100) * 0.4) + (Math.min(s.maxStreak/30*100,100) * 0.2);
  if (score >= 90) return 'S';
  if (score >= 75) return 'A';
  if (score >= 55) return 'B';
  if (score >= 35) return 'C';
  return 'D';
}

function computeGradeFromLogs(logs, cycle) {
  const daysStudied = logs.filter(l=>l.total_hours>0).length;
  const total = logs.reduce((s,l)=>s+(l.total_hours||0),0);
  const cycleDays = cycle?.start_date && cycle?.end_date ? Math.max(1, diffDaysIST(cycle.end_date, cycle.start_date) + 1) : 30;
  const consistency = daysStudied / Math.min(cycleDays,30) * 100;
  const score = consistency * 0.5 + Math.min(total/200*100,100) * 0.5;
  if (score >= 90) return 'S';
  if (score >= 75) return 'A';
  if (score >= 55) return 'B';
  if (score >= 35) return 'C';
  return 'D';
}

function getGradeLabel(g) {
  return {S:'Legendary Grind 🔥',A:'Solid Effort 💪',B:'Good Work ✅',C:'Can do better 📈',D:'Try harder next cycle 💀'}[g]||'';
}

// ============================================================
// UTILS
// ============================================================
function istParts(date = new Date()) {
  const fmt = new Intl.DateTimeFormat('en-CA', {
    timeZone: 'Asia/Kolkata',
    year: 'numeric',
    month: '2-digit',
    day: '2-digit'
  });
  const parts = fmt.format(date).split('-');
  return { y: parts[0], m: parts[1], d: parts[2] };
}

function istDateStr(offsetDays = 0, base = new Date()) {
  const { y, m, d } = istParts(base);
  const utc = new Date(Date.UTC(Number(y), Number(m) - 1, Number(d) + offsetDays));
  return utc.toISOString().slice(0, 10);
}

function todayStr() {
  return istDateStr(0);
}

function formatISTDate(d) {
  return d.toLocaleDateString('en-IN', { timeZone: 'Asia/Kolkata', weekday:'long', day:'numeric', month:'long' });
}

function istHour(date = new Date()) {
  const d = date instanceof Date ? date : new Date(date);
  if (Number.isNaN(d.getTime())) return 0;
  return Number(new Intl.DateTimeFormat('en-IN', {
    timeZone: 'Asia/Kolkata',
    hour: '2-digit',
    hour12: false
  }).format(d));
}

function timeAgo(iso) {
  if (!iso) return 'just now';
  const d = new Date(iso);
  if (Number.isNaN(d.getTime())) return 'just now';
  const diff = Date.now() - d.getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  return Math.floor(hrs / 24) + 'd ago';
}

function capitalize(s) {
  if (!s) return '';
  return s.charAt(0).toUpperCase() + s.slice(1);
}

function escapeHtml(value) {
  return String(value ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/\"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function safeJsonParse(value, fallback) {
  try {
    if (value === null || value === undefined || value === '') return fallback;
    return JSON.parse(value);
  } catch {
    return fallback;
  }
}

function diffDaysIST(laterDateKey, earlierDateKey) {
  const later = new Date(laterDateKey).getTime();
  const earlier = new Date(earlierDateKey).getTime();
  if (isNaN(later) || isNaN(earlier)) return 0;
  return Math.round((later - earlier) / 86400000);
}

function getMetricReachedDate(userId, metric, metricValue) {
  const logs = allLogs
    .filter(l => l.user_id === userId)
    .slice()
    .sort((a, b) => String(a.date || '').localeCompare(String(b.date || '')));

  if (logs.length === 0) return '9999-12-31';

  if (metric === 'currentStreak') {
    let streak = 0;
    for (let i = 0; i < 365; i++) {
      const dStr = istDateStr(-i);
      const log = logs.find(l => l.date === dStr && (l.total_hours || 0) > 0);
      if (log) streak++;
      else break;
    }
    const start = logs.find(l => l.date === istDateStr(-(streak - 1)) && (l.total_hours || 0) > 0);
    return start ? start.date : '9999-12-31';
  }

  if (metric === 'bestDay') {
    let best = -Infinity;
    let bestDate = '9999-12-31';
    for (const log of logs) {
      const hours = Number(log.total_hours || 0);
      if (hours > best) {
        best = hours;
        bestDate = log.date;
      }
    }
    return bestDate;
  }

  if (metric === 'daysStudied') {
    let count = 0;
    for (const log of logs) {
      if ((log.total_hours || 0) > 0) count++;
      if (count >= metricValue) return log.date;
    }
    return logs[logs.length - 1].date;
  }

  if (metric === 'totalHours' || metric === 'avgPerDay' || metric === 'consistencyScore') {
    let total = 0;
    let studied = 0;
    for (const log of logs) {
      const hours = Number(log.total_hours || 0);
      total += hours;
      if (hours > 0) studied++;
      if (metric === 'totalHours' && total >= metricValue) return log.date;
      if (metric === 'avgPerDay' && studied > 0 && (total / studied) >= metricValue) return log.date;
    }
    return logs[logs.length - 1].date;
  }

  return logs[logs.length - 1].date;
}

function compareMetricValues(aValue, bValue, aReachedAt, bReachedAt) {
  if (aValue > bValue) return 'a';
  if (bValue > aValue) return 'b';
  if (aReachedAt && bReachedAt) return aReachedAt <= bReachedAt ? 'a' : 'b';
  return 'a';
}
